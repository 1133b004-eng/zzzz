<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>☠️ 海盜寶藏配對 - 多關卡海洋冒險</title>
  <!-- Tabler Icons CSS CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <!-- Google Font: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f9fe 0%, #eef5fc 100%);
      color: #1a3a5f;
      font-family: var(--font-sans);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    #gw {
      padding: 2rem;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(12, 68, 124, 0.06);
      width: 100%;
      max-width: 480px;
      box-sizing: border-box;
      font-family: var(--font-sans);
    }

    .hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .hdr h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: #0C447C;
    }

    .stats {
      display: flex;
      gap: 8px;
    }

    .stat {
      background: #E6F1FB;
      border-radius: 10px;
      padding: 6px 12px;
      text-align: center;
      min-width: 55px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
    }

    .stat-label {
      font-size: 10px;
      color: #185FA5;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-val {
      font-size: 16px;
      font-weight: 600;
      color: #0C447C;
    }

    .stat-val.score {
      font-size: 20px;
    }

    .timer-bar-wrap {
      background: #dff0fc;
      border-radius: 99px;
      height: 10px;
      margin-bottom: 1rem;
      overflow: hidden;
      border: 1px solid #85B7EB;
    }

    #timer-bar {
      height: 100%;
      border-radius: 99px;
      background: #378ADD;
      transition: width 1s linear, background 0.5s;
    }

    .grid {
      display: grid;
      gap: 10px;
      max-width: 460px;
      margin: 0 auto 1rem;
    }

    .card {
      aspect-ratio: 1;
      perspective: 700px;
      cursor: pointer;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .card.flipped .card-inner, .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #85B7EB;
      box-shadow: 0 4px 8px rgba(12, 68, 124, 0.04);
    }

    .card-front {
      background: #1a5a8a;
      overflow: hidden;
    }

    .card-back {
      background: #dff0fc;
      border-color: #85B7EB;
      transform: rotateY(180deg);
      flex-direction: column;
      gap: 4px;
    }

    .card-back .clabel {
      font-size: 9px;
      color: #185FA5;
      font-weight: 600;
    }

    .card.matched .card-back {
      background: #C0DD97;
      border-color: #639922;
      box-shadow: 0 4px 10px rgba(99, 153, 34, 0.15);
    }

    .ship-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transition: transform 0.3s;
    }

    .card:hover .ship-svg {
      transform: scale(1.05);
    }

    .msg {
      text-align: center;
      font-size: 13px;
      color: #185FA5;
      min-height: 20px;
      margin-bottom: 0.8rem;
      font-weight: 500;
    }

    .btn-row {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    button.mb {
      background: #E6F1FB;
      border: 1px solid #85B7EB;
      border-radius: 10px;
      color: #185FA5;
      font-size: 13px;
      padding: 8px 20px;
      cursor: pointer;
      font-weight: 600;
      font-family: var(--font-sans);
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 4px rgba(12, 68, 124, 0.04);
    }

    button.mb:hover {
      background: #B5D4F4;
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(12, 68, 124, 0.08);
    }

    button.mb.accent {
      background: #378ADD;
      color: #fff;
      border-color: #185FA5;
    }

    button.mb.accent:hover {
      background: #185FA5;
    }

    .ow {
      position: relative;
      max-width: 460px;
      margin: 0 auto 1rem;
    }

    .overlay {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      z-index: 10;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .overlay.win {
      background: rgba(10, 45, 90, 0.94);
    }

    .overlay.lose {
      background: rgba(80, 19, 19, 0.92);
    }

    .overlay h3 {
      margin: 0;
      font-size: 19px;
      font-weight: 600;
      position: relative;
      z-index: 2;
    }

    .overlay p {
      margin: 0;
      font-size: 12px;
      position: relative;
      z-index: 2;
    }

    .ov-score {
      font-size: 38px;
      font-weight: 700;
      color: #FAC775;
      position: relative;
      z-index: 2;
      letter-spacing: 1px;
    }

    .ov-icon {
      font-size: 36px;
      position: relative;
      z-index: 2;
      animation: pulse 1.5s infinite alternate;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.1); }
    }

    #fw-canvas {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      z-index: 1;
      pointer-events: none;
    }

    .penalty {
      color: #E24B4A;
      font-size: 13px;
      font-weight: 600;
      position: absolute;
      top: 40%;
      left: 50%;
      pointer-events: none;
      z-index: 20;
      animation: fu 0.85s ease forwards;
    }

    @keyframes fu {
      0% { opacity: 1; transform: translate(-50%, -10px); }
      100% { opacity: 0; transform: translate(-50%, -60px); }
    }

    .lv-badge {
      display: inline-block;
      background: #B5D4F4;
      color: #0C447C;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      margin-left: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <h1 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">多關卡海盜配對遊戲</h1>
  
  <div id="gw">
    <div class="hdr">
      <h2>☠️ 海盜寶藏配對 <span class="lv-badge" id="lv-badge">第 1 關</span></h2>
      <div class="stats">
        <div class="stat">
          <div class="stat-label">⏱ 剩餘</div>
          <div class="stat-val" id="tdisp">50s</div>
        </div>
        <div class="stat">
          <div class="stat-label">配對</div>
          <div class="stat-val" id="pairs">0/?</div>
        </div>
        <div class="stat">
          <div class="stat-label">💰 分數</div>
          <div class="stat-val score" id="score">100</div>
        </div>
      </div>
    </div>
    
    <div class="timer-bar-wrap">
      <div id="timer-bar" style="width:100%"></div>
    </div>
    
    <div class="msg" id="msg">翻開卡牌，找出成對的海洋生物！</div>
    
    <div class="ow">
      <div class="grid" id="grid"></div>
      
      <div class="overlay win" id="overlay" style="display:none;">
        <canvas id="fw-canvas"></canvas>
        <div class="ov-icon" id="ov-icon">🏴‍☠️</div>
        <h3 id="ov-title" style="color:#E6F1FB;"></h3>
        <div class="ov-score" id="ov-score"></div>
        <p id="ov-sub" style="color:#B5D4F4;"></p>
        <div style="display:flex;gap:8px;margin-top:8px;position:relative;z-index:2;" id="ov-btns"></div>
      </div>
    </div>
    
    <div class="btn-row">
      <button class="mb" onclick="resetGame()">
        <i class="ti ti-refresh" aria-hidden="true"></i> 重新開始（第1關）
      </button>
    </div>
  </div>

  <script>
    const ALL_CREATURES = [
      {emoji:'🐠', name:'小丑魚'}, {emoji:'🐙', name:'章魚'}, {emoji:'🦑', name:'魷魚'}, {emoji:'🦀', name:'螃蟹'},
      {emoji:'🐡', name:'河豚'}, {emoji:'🦞', name:'龍蝦'}, {emoji:'🐚', name:'貝殼'}, {emoji:'🦈', name:'鯊魚'},
      {emoji:'🐬', name:'海豚'}, {emoji:'🦭', name:'海豹'}, {emoji:'🐳', name:'鯨魚'}, {emoji:'🦐', name:'蝦子'},
      {emoji:'🐟', name:'魚魚'}, {emoji:'🪸', name:'珊瑚'}, {emoji:'🦦', name:'水獺'}, {emoji:'🫧', name:'泡泡'}
    ];
    const FW_EMOJIS = ['🐠','🐙','🦈','🐬','🦑','🦀','🐡','🦞','🐚','🐳','🦭'];
    const TOTAL_TIME = 50;
    
    let level = 1;
    let flipped = [];
    let matched = 0;
    let moves = 0;
    let score = 100;
    let lock = false;
    let timeLeft = TOTAL_TIME;
    let timerInterval = null;
    let started = false;
    let fwAnim = null;
    let fwParticles = [];

    function pairsForLevel(lv) { return 4 + ((lv - 1) * 2); }
    
    function colsForLevel(lv) {
      const p = pairsForLevel(lv);
      const total = p * 2;
      if (total <= 8) return 4;
      if (total <= 12) return 4;
      if (total <= 16) return 4;
      return 5;
    }
    
    function emojiFontSize(lv) {
      if (lv <= 1) return '36px';
      if (lv <= 2) return '30px';
      if (lv <= 3) return '26px';
      return '22px';
    }

    function shuffle(a) { return [...a].sort(() => Math.random() - 0.5); }

    function shipSVG() {
      return `<svg class="ship-svg" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <rect width="80" height="80" fill="#1a5a8a"/>
        <ellipse cx="40" cy="72" rx="38" ry="7" fill="#0e3d6e" opacity="0.5"/>
        <path d="M12 52 Q40 64 68 52 L62 60 Q40 70 18 60 Z" fill="#7a4a1a"/>
        <path d="M16 52 L64 52 L62 60 L18 60 Z" fill="#9a6030"/>
        <rect x="38" y="18" width="4" height="36" fill="#5a3a0a"/>
        <path d="M42 20 L62 28 L42 44 Z" fill="#E6F1FB" opacity="0.9"/>
        <path d="M38 20 L18 28 L38 44 Z" fill="#dde8f5" opacity="0.85"/>
        <rect x="38" y="10" width="16" height="10" rx="1" fill="#111"/>
        <circle cx="44" cy="15" r="2.5" fill="#fff"/>
        <line x1="42" y1="18" x2="42" y2="12" stroke="#fff" stroke-width="1"/>
        <line x1="40" y1="15" x2="46" y2="15" stroke="#fff" stroke-width="1"/>
        <path d="M4 68 Q14 63 24 68 Q34 73 44 68 Q54 63 64 68 Q74 73 80 68 L80 80 L0 80 Z" fill="#1560a0" opacity="0.7"/>
        <path d="M0 72 Q10 67 20 72 Q30 77 40 72 Q50 67 60 72 Q70 77 80 72 L80 80 L0 80 Z" fill="#0d4a80" opacity="0.6"/>
      </svg>`;
    }

    function pirateFlag(w, h) {
      return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:${w}px;height:${h}px;display:block;">
        <rect width="${w}" height="${h}" rx="6" fill="#111"/>
        <circle cx="${w/2}" cy="${h/2-6}" r="${Math.min(w,h)*0.2}" fill="#fff"/>
        <line x1="${w/2-14}" y1="${h/2+10}" x2="${w/2+14}" y2="${h/2+22}" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        <line x1="${w/2+14}" y1="${h/2+10}" x2="${w/2-14}" y2="${h/2+22}" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      </svg>`;
    }

    function initLevel() {
      clearInterval(timerInterval);
      if (fwAnim) { cancelAnimationFrame(fwAnim); fwAnim = null; }
      fwParticles = [];
      const pairs = pairsForLevel(level);
      timeLeft = TOTAL_TIME;
      moves = 0;
      matched = 0;
      score = 100;
      lock = false;
      started = false;
      flipped = [];
      
      document.getElementById('lv-badge').textContent = '第 ' + level + ' 關';
      document.getElementById('tdisp').textContent = TOTAL_TIME + 's';
      document.getElementById('pairs').textContent = '0/' + pairs;
      document.getElementById('score').textContent = '100';
      document.getElementById('score').style.color = '#0C447C';
      document.getElementById('timer-bar').style.width = '100%';
      document.getElementById('timer-bar').style.background = '#378ADD';
      document.getElementById('msg').textContent = '第 ' + level + ' 關：找出 ' + pairs + ' 對海洋生物！';
      document.getElementById('overlay').style.display = 'none';
      
      const cols = colsForLevel(level);
      const grid = document.getElementById('grid');
      grid.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
      grid.innerHTML = '';
      
      const pool = shuffle(ALL_CREATURES).slice(0, pairs);
      const deck = shuffle([...pool, ...pool]);
      const fs = emojiFontSize(level);
      
      deck.forEach(c => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div class="card-inner">
          <div class="card-front">${shipSVG()}</div>
          <div class="card-back">
            <span style="font-size:${fs};line-height:1">${c.emoji}</span>
            <span class="clabel">${c.name}</span>
          </div>
        </div>`;
        card.dataset.key = c.name;
        card.addEventListener('click', () => flipCard(card));
        grid.appendChild(card);
      });
    }

    function resetGame() {
      level = 1;
      initLevel();
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        timeLeft--;
        const pct = (timeLeft / TOTAL_TIME) * 100;
        document.getElementById('tdisp').textContent = timeLeft + 's';
        document.getElementById('timer-bar').style.width = pct + '%';
        
        if (pct <= 30) {
          document.getElementById('timer-bar').style.background = '#E24B4A';
        } else if (pct <= 60) {
          document.getElementById('timer-bar').style.background = '#EF9F27';
        }
        
        if (timeLeft > 0 && timeLeft % 5 === 0 && matched < pairsForLevel(level)) {
          applyPenalty(2, '⏱ -2');
        }
        
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          showEnd(false);
        }
      }, 1000);
    }

    function applyPenalty(pts, label) {
      score = Math.max(0, score - pts);
      document.getElementById('score').textContent = score;
      
      if (score <= 30) {
        document.getElementById('score').style.color = '#E24B4A';
      } else if (score <= 60) {
        document.getElementById('score').style.color = '#BA7517';
      }
      
      const wrap = document.querySelector('.ow');
      const el = document.createElement('div');
      el.className = 'penalty';
      el.textContent = label;
      wrap.appendChild(el);
      
      setTimeout(() => el.remove(), 900);
    }

    function flipCard(card) {
      if (lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
      if (!started) {
        started = true;
        startTimer();
      }
      card.classList.add('flipped');
      flipped.push(card);
      
      if (flipped.length === 2) {
        lock = true;
        moves++;
        checkMatch();
      }
    }

    function checkMatch() {
      const [a, b] = flipped;
      if (a.dataset.key === b.dataset.key) {
        a.classList.add('matched');
        b.classList.add('matched');
        matched++;
        const pairs = pairsForLevel(level);
        document.getElementById('pairs').textContent = matched + '/' + pairs;
        document.getElementById('msg').textContent = '配對成功！🎉';
        flipped = [];
        lock = false;
        
        if (matched === pairs) {
          clearInterval(timerInterval);
          setTimeout(() => showEnd(true), 400);
        }
      } else {
        applyPenalty(3, '❌ -3');
        document.getElementById('msg').textContent = '不一樣！扣 3 分，再試試！';
        setTimeout(() => {
          a.classList.remove('flipped');
          b.classList.remove('flipped');
          flipped = [];
          lock = false;
          document.getElementById('msg').textContent = '翻開卡牌，找出成對的海洋生物！';
        }, 900);
      }
    }

    function showEnd(win) {
      const ov = document.getElementById('overlay');
      const btns = document.getElementById('ov-btns');
      btns.innerHTML = '';
      document.getElementById('ov-score').textContent = score + ' 分';

      if (win && score >= 60) {
        ov.className = 'overlay win';
        document.getElementById('ov-icon').textContent = '🏴‍☠️';
        document.getElementById('ov-title').style.color = '#E6F1FB';
        document.getElementById('ov-title').textContent = '第 ' + level + ' 關完成！煙火慶祝！';
        document.getElementById('ov-sub').textContent = '剩餘 ' + timeLeft + 's · 翻牌 ' + moves + ' 次 · 得分 ' + score + ' 分';
        
        const nb = document.createElement('button');
        nb.className = 'mb accent';
        nb.textContent = '➡ 下一關（' + (pairsForLevel(level + 1)) + ' 對）';
        nb.onclick = () => { level++; initLevel(); };
        btns.appendChild(nb);
        
        const rb = document.createElement('button');
        rb.className = 'mb';
        rb.textContent = '🔄 重玩本關';
        rb.onclick = () => initLevel();
        btns.appendChild(rb);
        
        ov.style.display = 'flex';
        setupFireworks(true);
      } else if (win && score < 60) {
        ov.className = 'overlay win';
        document.getElementById('ov-icon').textContent = '🏴‍☠️';
        document.getElementById('ov-title').style.color = '#FAC775';
        document.getElementById('ov-title').textContent = '完成，但分數不夠高…';
        document.getElementById('ov-sub').textContent = '60分以上才有煙火！再拼一次吧！';
        
        const nb = document.createElement('button');
        nb.className = 'mb accent';
        nb.textContent = '➡ 下一關';
        nb.onclick = () => { level++; initLevel(); };
        btns.appendChild(nb);
        
        const rb = document.createElement('button');
        rb.className = 'mb';
        rb.textContent = '🔄 重玩本關';
        rb.onclick = () => initLevel();
        btns.appendChild(rb);
        
        ov.style.display = 'flex';
      } else {
        ov.className = 'overlay lose';
        document.getElementById('ov-icon').textContent = '💀';
        document.getElementById('ov-title').style.color = '#F7C1C1';
        document.getElementById('ov-title').textContent = '時間到！沉船了…';
        document.getElementById('ov-sub').textContent = '配對 ' + matched + '/' + pairsForLevel(level) + ' · 得分 ' + score + ' 分';
        
        const rb = document.createElement('button');
        rb.className = 'mb';
        rb.textContent = '🔄 重玩本關';
        rb.onclick = () => initLevel();
        btns.appendChild(rb);
        
        const r1 = document.createElement('button');
        r1.className = 'mb';
        r1.textContent = '↩ 回第1關';
        r1.onclick = () => resetGame();
        btns.appendChild(r1);
        
        ov.style.display = 'flex';
      }
    }

    function setupFireworks(useFlag) {
      const canvas = document.getElementById('fw-canvas');
      const ov = document.getElementById('overlay');
      canvas.width = ov.offsetWidth || 460;
      canvas.height = ov.offsetHeight || 340;
      const ctx = canvas.getContext('2d');
      fwParticles = [];

      // prerender pirate flag to offscreen canvas
      const flagW = 40, flagH = 28;
      const flagCanvas = document.createElement('canvas');
      flagCanvas.width = flagW;
      flagCanvas.height = flagH;
      const fctx = flagCanvas.getContext('2d');
      fctx.fillStyle = '#111';
      fctx.beginPath();
      fctx.roundRect(0, 0, flagW, flagH, 4);
      fctx.fill();
      fctx.fillStyle = '#fff';
      fctx.beginPath();
      fctx.arc(flagW / 2, flagH / 2 - 4, flagW * 0.18, 0, Math.PI * 2);
      fctx.fill();
      fctx.strokeStyle = '#fff';
      fctx.lineWidth = 3;
      fctx.lineCap = 'round';
      fctx.beginPath();
      fctx.moveTo(flagW / 2 - 8, flagH / 2 + 6);
      fctx.lineTo(flagW / 2 + 8, flagH / 2 + 14);
      fctx.stroke();
      fctx.beginPath();
      fctx.moveTo(flagW / 2 + 8, flagH / 2 + 6);
      fctx.lineTo(flagW / 2 - 8, flagH / 2 + 14);
      fctx.stroke();

      const COLORS = ['#85B7EB', '#378ADD', '#FAC775', '#C0DD97', '#F4C0D1', '#9FE1CB', '#EF9F27', '#B5D4F4'];

      function spawnBurst() {
        const cx = 40 + Math.random() * (canvas.width - 80);
        const cy = 20 + Math.random() * (canvas.height * 0.65);
        const count = 20 + Math.floor(Math.random() * 10);
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 / count) * i + Math.random() * 0.25;
          const speed = 1.8 + Math.random() * 3.2;
          fwParticles.push({
            x: cx,
            y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            alpha: 1,
            size: 2.5 + Math.random() * 3,
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            type: 'spark',
            gravity: 0.06
          });
        }
        
        if (useFlag && Math.random() < 0.55) {
          fwParticles.push({
            x: cx,
            y: cy,
            vx: 0,
            vy: -0.25,
            alpha: 1,
            type: 'flag',
            flagCanvas,
            size: 1,
            gravity: 0.008
          });
        } else {
          const em = FW_EMOJIS[Math.floor(Math.random() * FW_EMOJIS.length)];
          fwParticles.push({
            x: cx,
            y: cy,
            vx: 0,
            vy: -0.3,
            alpha: 1,
            emoji: em,
            type: 'emoji',
            size: 24,
            gravity: 0.01
          });
        }
      }

      let lastBurst = 0;
      function loop(ts) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (ts - lastBurst > 650) {
          lastBurst = ts;
          spawnBurst();
        }
        for (let i = fwParticles.length - 1; i >= 0; i--) {
          const p = fwParticles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += p.gravity;
          p.alpha -= 0.012;
          
          if (p.alpha <= 0) {
            fwParticles.splice(i, 1);
            continue;
          }
          
          ctx.globalAlpha = p.alpha;
          if (p.type === 'spark') {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
          } else if (p.type === 'emoji') {
            ctx.font = p.size + 'px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(p.emoji, p.x, p.y);
          } else if (p.type === 'flag') {
            ctx.drawImage(p.flagCanvas, p.x - flagW / 2, p.y - flagH / 2, flagW, flagH);
          }
          ctx.globalAlpha = 1;
        }
        fwAnim = requestAnimationFrame(loop);
      }
      fwAnim = requestAnimationFrame(loop);
    }

    initLevel();
  </script>
</body>
